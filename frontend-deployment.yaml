apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: voiture
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/cl-krma/voiture-frontend:5c72dc657b07209e674a8f9e2b571be4ebeb9b8d
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: db
            - name: DB_USER
              value: user
            - name: DB_PASS
              value: pass
            - name: DB_NAME
              value: myapp
            - name: JWT_SECRET
              value: secretKey
